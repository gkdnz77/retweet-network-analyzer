<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Network Analysis Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05050e;--bg2:#09091a;--bg3:#0e0e22;
  --border:#1c1c38;--border2:#262645;
  --text:#ddddf5;--muted:#4f4f7a;--muted2:#7070a0;
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow-x:hidden}
.mesh{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 90% 60% at 20% -10%,rgba(99,102,241,.13) 0%,transparent 55%),
    radial-gradient(ellipse 60% 50% at 85% 110%,rgba(236,72,153,.09) 0%,transparent 55%)}
.wrap{position:relative;z-index:1;max-width:1360px;margin:0 auto;padding:0 24px 60px}

header{display:flex;align-items:center;justify-content:space-between;
  padding:22px 0 18px;border-bottom:1px solid var(--border);margin-bottom:24px;animation:fd .6s ease both}
.brand{display:flex;align-items:center;gap:14px}
.brand-icon{width:44px;height:44px;background:linear-gradient(135deg,#6366f1,#ec4899);border-radius:13px;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:0 0 32px rgba(99,102,241,.4)}
.brand-text h1{font-size:24px;font-weight:800;letter-spacing:-.5px;
  background:linear-gradient(90deg,#a5b4fc,#f9a8d4,#6ee7b7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-text p{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
.hbadge{font-size:10px;font-family:var(--mono);padding:5px 14px;border-radius:20px;
  background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6ee7b7;letter-spacing:.5px}

.ibar{display:flex;gap:10px;flex-wrap:wrap;background:var(--bg2);
  border:1px solid var(--border2);border-radius:14px;padding:14px 16px;
  margin-bottom:18px;animation:fu .5s .1s ease both;position:relative;overflow:hidden}
.ibar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(99,102,241,.5),rgba(236,72,153,.4),transparent)}
.ifield{flex:1;min-width:260px;background:var(--bg);border:1px solid var(--border2);border-radius:9px;
  padding:12px 16px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;
  transition:border-color .2s,box-shadow .2s}
.ifield:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.ifield::placeholder{color:var(--muted)}
.abtn{padding:12px 24px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:9px;
  color:#fff;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 20px rgba(99,102,241,.45);transition:transform .15s,box-shadow .2s;white-space:nowrap}
.abtn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(99,102,241,.6)}
.abtn:disabled{opacity:.4;cursor:not-allowed;transform:none}

.error-box{display:none;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);
  border-radius:12px;padding:14px 18px;margin-bottom:16px;font-size:13px;color:#fca5a5;
  font-family:var(--mono);animation:fu .3s ease both}

.stats{display:none;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;
  margin-bottom:16px;animation:fu .4s ease both}
.sbox{background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;position:relative;overflow:hidden}
.sbox::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px}
.sbox:nth-child(1)::after{background:#6366f1}
.sbox:nth-child(2)::after{background:#10b981}
.sbox:nth-child(3)::after{background:#f97316}
.sbox:nth-child(4)::after{background:#ec4899}
.sbox:nth-child(5)::after{background:#f59e0b}
.sn{font-size:26px;font-weight:800;font-family:var(--mono);
  background:linear-gradient(135deg,#a5b4fc,#f9a8d4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.sl{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.3px}

.pills{display:none;flex-wrap:wrap;gap:6px;margin-bottom:14px;animation:fu .4s .05s ease both}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);
  padding:5px 12px;border-radius:20px;border:1px solid var(--border2);color:var(--muted);
  cursor:pointer;user-select:none;transition:all .18s;background:var(--bg2)}
.pill:hover{color:var(--text);border-color:var(--muted)}
.pill.active{color:var(--text)}
.pill-all.active{border-color:#a5b4fc;color:#a5b4fc}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.layout{display:none;grid-template-columns:1fr 340px;gap:16px;animation:fu .4s .1s ease both}
@media(max-width:900px){.layout{grid-template-columns:1fr}}

.panel{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;overflow:hidden}
.phead{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg3)}
.ptitle{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}
.pbadge{font-size:10px;font-family:var(--mono);padding:2px 9px;border-radius:20px;
  background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);color:#a5b4fc}
.ghint{font-size:10px;font-family:var(--mono);color:var(--muted);
  padding:6px 16px;border-bottom:1px solid var(--border);background:var(--bg3);text-align:center}

#svg-wrap{width:100%;position:relative;overflow:hidden;background:var(--bg)}
#graph-svg{display:block;width:100%}

.gtip{position:absolute;pointer-events:none;opacity:0;transition:opacity .12s;
  background:var(--bg3);border:1px solid var(--border2);border-radius:10px;
  padding:10px 14px;z-index:20;font-size:12px;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.gtip-name{font-weight:700;font-size:13px;margin-bottom:2px}
.gtip-grp{color:var(--muted);font-family:var(--mono);font-size:11px}

.detail-panel{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;
  overflow:hidden;display:flex;flex-direction:column}
.dempty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:40px 20px;color:var(--muted);text-align:center}
.dempty-icon{width:52px;height:52px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:22px;opacity:.5}
.dempty p{font-size:12px;line-height:1.6}
.dinner{display:flex;flex-direction:column;animation:fu .25s ease both}
.dcolorbar{height:3px}
.dhead{padding:16px 18px 12px;border-bottom:1px solid var(--border)}
.dgname{font-size:15px;font-weight:800;letter-spacing:-.3px;margin-bottom:4px}
.dgcount{font-size:11px;font-family:var(--mono);color:var(--muted)}
.ddesc{padding:12px 18px 14px;font-size:12px;color:var(--muted2);line-height:1.65;border-bottom:1px solid var(--border)}
.mlabel{padding:10px 18px 6px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}
.mlist{overflow-y:auto;padding:6px 18px 18px;max-height:360px;display:flex;flex-wrap:wrap;gap:5px}
.mlist::-webkit-scrollbar{width:3px}
.mlist::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.mchip{font-family:var(--mono);font-size:10.5px;padding:3px 9px;border-radius:12px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:var(--text)}
.closebtn{display:flex;align-items:center;gap:6px;padding:9px 18px;
  border-bottom:1px solid var(--border);background:var(--bg3);
  font-size:11px;font-family:var(--mono);color:var(--muted);cursor:pointer;transition:color .15s}
.closebtn:hover{color:var(--text)}

.loading{display:none;flex-direction:column;align-items:center;padding:70px 20px;gap:16px}
.sring{width:44px;height:44px;border:2px solid var(--border);
  border-top-color:#6366f1;border-right-color:#ec4899;
  border-radius:50%;animation:spin .8s linear infinite}
.lstep{font-size:12px;font-family:var(--mono);color:var(--muted);animation:pulse 1.4s ease infinite}

@keyframes fd{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
</style>
</head>
<body>
<div class="mesh"></div>
<div class="wrap">

<header>
  <div class="brand">
    <div class="brand-icon">🕸</div>
    <div class="brand-text">
      <h1>Social Graph Tool</h1>
      <p>Social network analysis</p>
    </div>
  </div>
  <div class="hbadge">API-READY DEMO</div>
</header>

<div class="ibar">
  <input class="ifield" id="url" placeholder="https://twitter.com/user/status/1234567890 or https://x.com/...">
  <button class="abtn" id="abtn" onclick="analyze()">🔍 Çözümle</button>
</div>

<div class="error-box" id="errBox"></div>

<div class="loading" id="loading">
  <div class="sring"></div>
  <div class="lstep" id="lstep">Bağlantı kuruluyor...</div>
</div>

<div class="stats" id="stats">
  <div class="sbox"><div class="sn" id="sRT">0</div><div class="sl">RT Eden</div></div>
  <div class="sbox"><div class="sn" id="sGrp">0</div><div class="sl">Küme</div></div>
  <div class="sbox"><div class="sn" id="sMutual">0</div><div class="sl">Karşılıklı Takip</div></div>
  <div class="sbox"><div class="sn" id="sBot">0</div><div class="sl">Bot Şüphesi</div></div>
  <div class="sbox"><div class="sn" id="sNew">0</div><div class="sl">Yeni Hesap</div></div>
</div>

<div class="pills" id="pills"></div>

<div class="layout" id="layout">
  <div class="panel">
    <div class="phead">
      <span class="ptitle">Sosyal Ağ Ağacı</span>
      <span class="pbadge" id="netBadge">—</span>
    </div>
    <div class="ghint">Kümeye tıkla → büyüt &amp; detay gör &nbsp;|&nbsp; Düğümü sürükle</div>
    <div id="svg-wrap">
      <svg id="graph-svg"></svg>
      <div class="gtip" id="tip"></div>
    </div>
  </div>
  <div class="detail-panel" id="detPanel">
    <div class="phead">
      <span class="ptitle">Küme Detayı</span>
      <span class="pbadge" id="detBadge">—</span>
    </div>
    <div id="detBody">
      <div class="dempty">
        <div class="dempty-icon">👆</div>
        <p>Bir kümeye tıkla<br>detayları burada gör</p>
      </div>
    </div>
  </div>
</div>

</div>
<script>
const GDEFS = [
  { id:'mutual',       name:'Karşılıklı Takip',   icon:'⇄', color:'#6366f1',
    desc:'RT edenler arasında birbirini karşılıklı takip eden kullanıcılar. /followings API\'sinden takip listeleri çekilip iki yönlü kenar aranarak tespit edildi. Union-Find algoritması ile aynı kümeye toplandı.' },
  { id:'interaction',  name:'Tek Yönlü Takip',    icon:'↑', color:'#10b981',
    desc:'RT edenlerden birini takip eden ancak karşılık almayan kullanıcılar. Takip listesinde RT edenlerden biri görünüyor ama o kişi geri takip etmiyor.' },
  { id:'new_follower', name:'Yeni Hesap',          icon:'+', color:'#f59e0b',
    desc:'created_at alanında 2024 veya 2025 geçen hesaplar. Yeni açılmış hesap anlamına gelir — bu kişinin sizi yeni takip ettiği anlamına gelmez.' },
  { id:'unfollower',   name:'Düşük Aktiviteli',   icon:'◷', color:'#94a3b8',
    desc:'Hesap yaşı 2023 öncesi olan ve statuses_count < 100 ile followers_count < 100 koşullarını birlikte sağlayan hesaplar. API\'den çekilen gerçek veriye dayanır.' },
  { id:'bot_suspect',  name:'Bot Şüphesi',         icon:'⚠', color:'#f97316',
    desc:'Şüphe göstergesi — kesin değil. Kullanıcı adında %50+ sayı ve 500\'den az tweet, ya da 4 karakterden kısa kullanıcı adı ve 200\'den az tweet koşulları birlikte aranır.' },
  { id:'viral',        name:'Viral Yayıcı',        icon:'⚡', color:'#ec4899',
    desc:'followers_count > 2000 veya verified hesaplar. API\'den gelen gerçek takipçi sayısına dayanır. Bu kişilerin RT\'si daha geniş kitlelere ulaşabilir.' },
  { id:'independent',  name:'Bağımsız',            icon:'○', color:'#475569',
    desc:'Yukarıdaki hiçbir koşula girmeyen kullanıcılar. RT edenler arasında bilinen bir takip bağı yok, bot örüntüsü yok, yeni hesap da değil.' },
];

let lastData=null, selectedGroup=null, filterGroup=null, simRef=null;

async function analyze() {
  const url = document.getElementById('url').value.trim();
  if (!url) { shake(document.getElementById('url')); return; }

  document.getElementById('abtn').disabled = true;
  document.getElementById('errBox').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('stats').style.display = 'none';
  document.getElementById('pills').style.display = 'none';
  document.getElementById('layout').style.display = 'none';
  selectedGroup = null; filterGroup = null;

  const steps = [
    'API connection is being prepared...','RT edenler listeleniyor...',
    'Kullanıcı ID\'leri alınıyor...','Takip ilişkileri analiz ediliyor...',
    'Union-Find algoritması çalışıyor...','7 kümeye ayrılıyor...','Ağaç grafiği oluşturuluyor...'
  ];
  let si = 0;
  const iv = setInterval(() => {
    document.getElementById('lstep').textContent = steps[Math.min(si++, steps.length-1)];
  }, 500);

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    clearInterval(iv);
    const data = await res.json();

    if (!res.ok || data.error) {
      showError(data.error || 'Bilinmeyen hata');
      return;
    }

    lastData = { users: data.users, groups: data.groups };

    animNum('sRT',     data.total);
    animNum('sGrp',    Object.keys(data.groups).length);
    animNum('sMutual', (data.groups['mutual']      || []).length);
    animNum('sBot',    (data.groups['bot_suspect'] || []).length);
    animNum('sNew',    (data.groups['new_follower']|| []).length);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('stats').style.display = 'grid';
    document.getElementById('pills').style.display = 'flex';
    document.getElementById('layout').style.display = 'grid';
    document.getElementById('netBadge').textContent = `${data.total} kullanıcı`;
    document.getElementById('detBadge').textContent = 'Seçilmedi';

    buildPills(data.groups);
    resetDetail();
    drawGraph(data.groups, null, null);

  } catch (err) {
    clearInterval(iv);
    showError('Backend\'e bağlanılamadı. python app.py çalışıyor mu? ' + err.message);
  } finally {
    document.getElementById('abtn').disabled = false;
  }
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  const b = document.getElementById('errBox');
  b.textContent = '❌ ' + msg;
  b.style.display = 'block';
}

function buildPills(groups) {
  const bar = document.getElementById('pills'); bar.innerHTML = '';
  const all = document.createElement('div');
  all.className = 'pill pill-all active'; all.id = 'pill-all';
  all.innerHTML = '<span style="font-size:13px">◎</span> Tümü';
  all.onclick = () => setPill(null);
  bar.appendChild(all);
  GDEFS.forEach(gd => {
    if (!groups[gd.id]?.length) return;
    const el = document.createElement('div');
    el.className = 'pill'; el.id = `pill-${gd.id}`;
    el.innerHTML = `<div class="pdot" style="background:${gd.color}"></div>${gd.icon} ${gd.name} <span style="opacity:.45;font-size:9px">${groups[gd.id].length}</span>`;
    el.onclick = () => setPill(gd.id);
    bar.appendChild(el);
  });
}

function setPill(gid) {
  filterGroup = filterGroup === gid ? null : gid;
  document.querySelectorAll('.pill').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(filterGroup ? `pill-${filterGroup}` : 'pill-all');
  if (el) {
    el.classList.add('active');
    if (filterGroup) {
      const gd = GDEFS.find(g => g.id === filterGroup);
      el.style.borderColor = gd?.color || '';
      el.style.color = gd?.color || '';
    }
  }
  drawGraph(lastData.groups, selectedGroup, filterGroup);
}

function drawGraph(groups, expandId, filt) {
  const wrap = document.getElementById('svg-wrap');
  const W = wrap.clientWidth || 800;
  const H = 570;

  d3.select('#graph-svg').attr('width', W).attr('height', H).selectAll('*').remove();
  const svg = d3.select('#graph-svg');
  if (simRef) simRef.stop();

  const colorMap = {}; GDEFS.forEach(g => colorMap[g.id] = g.color);
  const activeGroups = GDEFS.filter(g => groups[g.id]?.length > 0);
  const N = activeGroups.length;
  const CX = W/2, CY = H/2;
  const R = Math.min(W, H) * 0.30;

  // Grup merkezleri — daire üzerinde eşit aralıkla
  const gCenters = {};
  activeGroups.forEach((gd, i) => {
    const angle = (2 * Math.PI * i / N) - Math.PI/2;
    gCenters[gd.id] = { x: CX + R * Math.cos(angle), y: CY + R * Math.sin(angle) };
  });

  // Tüm user nodeları
  const allUsers = [];
  activeGroups.forEach(gd => {
    (groups[gd.id] || []).forEach(u => {
      const c = gCenters[gd.id];
      allUsers.push({
        id: u.username, username: u.username,
        name: u.name || u.username, group: gd.id,
        x: c.x + (Math.random()-.5)*35,
        y: c.y + (Math.random()-.5)*35,
      });
    });
  });

  const isDim = u => filt && u.group !== filt;

  // Gradient merkez node için
  const defs = svg.append('defs');
  const lg = defs.append('linearGradient').attr('id','cg').attr('x1','0%').attr('y1','0%').attr('x2','100%').attr('y2','100%');
  lg.append('stop').attr('offset','0%').attr('stop-color','#6366f1');
  lg.append('stop').attr('offset','100%').attr('stop-color','#ec4899');

  // Merkez → grup bağlantı çizgileri (ağaç dalları)
  activeGroups.forEach(gd => {
    const c = gCenters[gd.id];
    const isExp = expandId === gd.id;
    const dimLine = filt && gd.id !== filt;
    svg.append('line')
      .attr('x1', CX).attr('y1', CY).attr('x2', c.x).attr('y2', c.y)
      .attr('stroke', gd.color)
      .attr('stroke-width', isExp ? 2 : .8)
      .attr('stroke-opacity', dimLine ? .03 : isExp ? .45 : .14)
      .attr('stroke-dasharray', isExp ? null : '6 4');
  });

  // Grup bubble arka planları
  const bgG = svg.append('g');
  const bgArr = [], lblArr = [], cntArr = [];

  activeGroups.forEach((gd, i) => {
    const c = gCenters[gd.id];
    const cnt = groups[gd.id].length;
    const isExp = expandId === gd.id;
    const dimG = filt && gd.id !== filt;
    const bR = isExp ? 72 + cnt*2 : 28 + cnt*3.8;

    const circ = bgG.append('circle')
      .attr('cx', c.x).attr('cy', c.y).attr('r', bR)
      .attr('fill', gd.color).attr('opacity', dimG ? .015 : isExp ? .12 : .07)
      .attr('stroke', gd.color).attr('stroke-width', isExp ? 1.5 : .8)
      .attr('stroke-opacity', dimG ? .04 : isExp ? .4 : .18)
      .attr('stroke-dasharray', isExp ? null : '5 3');
    bgArr.push({ gd, circ });

    const lbl = bgG.append('text')
      .attr('x', c.x).attr('y', c.y - bR - 10)
      .attr('text-anchor', 'middle')
      .attr('font-size', isExp ? 12 : 10.5).attr('font-weight', 700)
      .attr('fill', gd.color).attr('opacity', dimG ? .12 : .92)
      .attr('font-family', 'Syne, sans-serif')
      .text(`${gd.icon} ${gd.name}`);
    lblArr.push({ gd, lbl });

    const cntLbl = bgG.append('text')
      .attr('x', c.x).attr('y', c.y - bR + 2)
      .attr('text-anchor', 'middle').attr('font-size', 9)
      .attr('fill', gd.color).attr('opacity', dimG ? .06 : .42)
      .attr('font-family', 'DM Mono, monospace')
      .text(`${cnt} kullanıcı`);
    cntArr.push({ gd, cntLbl });

    bgG.append('circle')
      .attr('cx', c.x).attr('cy', c.y).attr('r', bR)
      .attr('fill', 'transparent').attr('cursor', 'pointer')
      .on('click', () => onGroupClick(gd.id));
  });

  // Merkez tweet nodu
  const cG = svg.append('g').attr('transform', `translate(${CX},${CY})`);
  cG.append('circle').attr('r', 30).attr('fill', '#0d0d20').attr('stroke', 'url(#cg)').attr('stroke-width', 2);
  cG.append('text').attr('text-anchor', 'middle').attr('dy', '-5').attr('font-size', 18).text('🐦');
  cG.append('text').attr('text-anchor', 'middle').attr('dy', '11')
    .attr('font-size', 7.5).attr('fill', '#a5b4fc').attr('font-weight', 700)
    .attr('font-family', 'Syne, sans-serif').attr('letter-spacing', 1).text('TWEET');

  // D3 force simulation
  const nodeG = svg.append('g');
  const sim = d3.forceSimulation(allUsers)
    .force('cx', d3.forceX().x(d => (gCenters[d.group]||{x:CX}).x).strength(0.55))
    .force('cy', d3.forceY().y(d => (gCenters[d.group]||{y:CY}).y).strength(0.55))
    .force('charge', d3.forceManyBody().strength(-28))
    .force('coll', d3.forceCollide(expandId ? d => d.group===expandId ? 12 : 8 : 9))
    .alphaDecay(.025).velocityDecay(.42).stop();

  for (let i = 0; i < 90; i++) sim.tick();

  const nodeEls = nodeG.selectAll('g.un').data(allUsers).join('g').attr('class','un')
    .attr('cursor', 'pointer')
    .attr('transform', d => `translate(${cl(d.x,12,W-12)},${cl(d.y,12,H-12)})`)
    .call(d3.drag()
      .on('start',(ev,d) => { simRef.alphaTarget(.1).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (ev,d) => { d.fx=ev.x; d.fy=ev.y; })
      .on('end',  (ev,d) => { simRef.alphaTarget(0); d.fx=null; d.fy=null; })
    )
    .on('mouseover', (ev,d) => {
      const gd = GDEFS.find(g => g.id===d.group);
      const tip = document.getElementById('tip');
      tip.innerHTML = `<div class="gtip-name" style="color:${gd.color}">@${d.username}</div><div class="gtip-grp">${gd.icon} ${gd.name}</div>`;
      tip.style.opacity = 1;
      const rect = wrap.getBoundingClientRect();
      let tx = ev.clientX-rect.left+14, ty = ev.clientY-rect.top-50;
      if (tx+180>W) tx -= 185; if (ty<0) ty=8;
      tip.style.left = tx+'px'; tip.style.top = ty+'px';
    })
    .on('mouseleave', () => { document.getElementById('tip').style.opacity=0; });

  const isExp = d => expandId && d.group===expandId;
  const nr = d => isExp(d) ? 9.5 : 7;

  nodeEls.append('circle').attr('r', nr)
    .attr('fill', d => isDim(d) ? '#111128' : colorMap[d.group])
    .attr('stroke', d => isDim(d) ? '#1c1c38' : colorMap[d.group])
    .attr('stroke-width', 1.5)
    .attr('opacity', d => isDim(d) ? .12 : isExp(d) ? 1 : .8)
    .style('filter', d => !isDim(d) && isExp(d) ? `drop-shadow(0 0 5px ${colorMap[d.group]}99)` : null);

  nodeEls.append('text')
    .attr('dy', d => isExp(d) ? 22 : 17)
    .attr('text-anchor', 'middle')
    .attr('font-size', d => isExp(d) ? 9 : 7.5)
    .attr('font-family', 'DM Mono, monospace')
    .attr('fill', d => isDim(d) ? '#1c1c38' : colorMap[d.group])
    .attr('opacity', d => isDim(d) ? 0 : isExp(d) ? .88 : .5)
    .text(d => '@'+d.username);

  simRef = sim;
  sim.on('tick', () => {
    nodeEls.attr('transform', d => `translate(${cl(d.x,14,W-14)},${cl(d.y,14,H-14)})`);
    activeGroups.forEach((gd, i) => {
      const gNodes = allUsers.filter(n => n.group===gd.id);
      if (!gNodes.length) return;
      const mx = gNodes.reduce((s,n)=>s+n.x,0)/gNodes.length;
      const my = gNodes.reduce((s,n)=>s+n.y,0)/gNodes.length;
      const maxD = Math.max(24, ...gNodes.map(n=>Math.hypot(n.x-mx,n.y-my)))+14;
      bgArr[i]?.circ.attr('cx',mx).attr('cy',my).attr('r',maxD);
      lblArr[i]?.lbl.attr('x',mx).attr('y',my-maxD-10);
      cntArr[i]?.cntLbl.attr('x',mx).attr('y',my-maxD+2);
    });
  });
  sim.restart();
  simRef = sim;
}

function cl(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }

function onGroupClick(gid) {
  if (selectedGroup === gid) {
    selectedGroup = null;
    drawGraph(lastData.groups, null, filterGroup);
    resetDetail();
    document.getElementById('detBadge').textContent = 'Seçilmedi';
  } else {
    selectedGroup = gid;
    drawGraph(lastData.groups, gid, filterGroup);
    showDetail(gid);
  }
}

function showDetail(gid) {
  const gd = GDEFS.find(g => g.id===gid);
  const members = lastData.groups[gid] || [];
  document.getElementById('detBadge').textContent = `${members.length} kişi`;
  document.getElementById('detBody').innerHTML = `
    <div class="dinner">
      <div class="dcolorbar" style="background:linear-gradient(90deg,${gd.color},${gd.color}33)"></div>
      <div class="closebtn" onclick="onGroupClick('${gid}')">← Küçült &amp; kapat</div>
      <div class="dhead">
        <div class="dgname" style="color:${gd.color}">${gd.icon} ${gd.name}</div>
        <div class="dgcount">${members.length} kullanıcı bu kümede</div>
      </div>
      <div class="ddesc">${gd.desc}</div>
      <div class="mlabel">Kullanıcılar</div>
      <div class="mlist">
        ${members.map(u=>`<span class="mchip" style="border-color:${gd.color}25">@${u.username||u}</span>`).join('')}
      </div>
    </div>`;
}

function resetDetail() {
  document.getElementById('detBody').innerHTML = `
    <div class="dempty">
      <div class="dempty-icon">👆</div>
      <p>Bir kümeye tıkla<br>detayları burada gör</p>
    </div>`;
}

function animNum(id, target) {
  const el = document.getElementById(id); let cur=0;
  const st = Math.ceil(target/24);
  const t = setInterval(()=>{ cur=Math.min(cur+st,target); el.textContent=cur; if(cur>=target)clearInterval(t); }, 32);
}
function shake(el) {
  el.style.borderColor='#ef4444'; el.style.boxShadow='0 0 0 3px rgba(239,68,68,.15)';
  setTimeout(()=>{ el.style.borderColor=''; el.style.boxShadow=''; }, 1200);
}
document.getElementById('url').addEventListener('keydown', e=>{ if(e.key==='Enter') analyze(); });
window.addEventListener('resize', ()=>{ if(lastData) drawGraph(lastData.groups, selectedGroup, filterGroup); });
</script>
